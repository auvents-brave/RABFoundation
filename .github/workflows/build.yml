name: Build Swift Package on Multiple Platforms

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  SWIFT_VERSION: '5.9'

jobs:
  build-macos:
    name: Build & Test macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - run: swift build --disable-sandbox

      - run: swift test --disable-sandbox

  build-ios:
    name: Build iOS Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - run: |
          xcodebuild \
            -scheme RabFoundation \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 14,OS=17.0' \
            clean build

  build-tvos:
    name: Build tvOS Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - run: |
          xcodebuild \
            -scheme RabFoundation \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV 4K,OS=17.0' \
            clean build

  build-watchos:
    name: Build watchOS Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - run: |
          xcodebuild \
            -scheme RabFoundation \
            -sdk watchsimulator \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 8 - 45mm,OS=10.0' \
            clean build

  build-visionos:
    name: Build visionOS Simulator
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - run: |
          xcodebuild \
            -scheme RabFoundation \
            -sdk visionossimulator \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro,OS=1.0' \
            clean build

  build-linux:
    name: Build & Test Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - run: swift build --disable-sandbox

      - run: swift test --disable-sandbox

  build-windows:
    name: Build & Test Windows
    runs-o
