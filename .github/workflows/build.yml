name: Build Swift Package on Multiple Platforms

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  SWIFT_VERSION: "6.1"

jobs:
  build-swift-matrix:
    name: Build & Test - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            type: native
            build: swift build --disable-sandbox
            test: swift test --disable-sandbox
            skip: false

          - name: Linux
            runner: ubuntu-22.04
            type: native
            build: swift build --disable-sandbox
            test: swift test --disable-sandbox
            skip: false

          - name: iOS Simulator
            runner: macos-latest
            type: xcodebuild
            sdk: iphonesimulator
            destination: 'platform=iOS Simulator,name=iPhone 16e,OS=18.4'
            run_tests: true
            skip: false

          - name: tvOS Simulator
            runner: macos-latest
            type: xcodebuild
            sdk: appletvsimulator
            destination: 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation) (at 1080p),OS=18.4'
            run_tests: true
            skip: false

          - name: watchOS Simulator (Build only)
            runner: macos-latest
            type: xcodebuild
            sdk: watchsimulator
            destination: 'platform=watchOS Simulator,name=Apple Watch Ultra 2 (49mm),OS=11.2'
            run_tests: false  # No test support
            skip: false

          - name: visionOS Simulator
            runner: macos-latest
            type: xcodebuild
            sdk: xrssimulator
            destination: 'platform=visionOS Simulator,name=Apple Vision Pro,OS=1.0'
            run_tests: false
            skip: true

          - name: macCatalyst
            runner: macos-latest
            type: xcodebuild
            destination: 'platform=macOS,variant=Mac Catalyst'
            run_tests: true
            skip: true

    steps:
      - uses: actions/checkout@v3

# Swift Setup (non-Windows)
      - name: Setup Swift
        if: matrix.type != 'windows' && matrix.skip != true
        uses: swift-actions/setup-swift@v2.3.0
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Show available SDSKs
        if: matrix.type == 'xcodebuild' && matrix.skip != true
        run: xcodebuild -showsdks

      - name: Skipped target warning
        if: matrix.skip == true
        run: echo "::warning::'${{ matrix.name }}' is ignored for the moment."

# Native build
      - name: Build (native)
        if: matrix.type == 'native' && matrix.skip != true
        run: ${{ matrix.build }}

      - name: Run Tesst (native)
        if: matrix.type == 'native' && matrix.skip != true
        run: ${{ matrix.test }}

# xcodebuild platforms
      - name: Build with xcodebuild
        if: matrix.type == 'xcodebuild' && matrix.skip != true
        run: |
          xcodebuild \
            -scheme rab-foundation \
            -sdk ${{ matrix.sdk || '' }} \
            -destination '${{ matrix.destination }}' \
            clean build

      - name: Run Tests with xcodebuild
        if: matrix.type == 'xcodebuild' && matrix.run_tests == true && matrix.skip != true
        run: |
          xcodebuild \
            -scheme rab-foundation \
            -sdk ${{ matrix.sdk || '' }} \
            -destination '${{ matrix.destination }}' \
            clean test

  build-windows:
    name: Build & Test - Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Swift 6.1 on Windows
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE

      - run: swift --version

      - run: swift build

      - run: swift test

  build-wasm:
    name: Build & Test - WebAssembly
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Swift SDK for wasm32-unknown-wasi
        run: |
          curl -LO https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.1-RELEASE/swift-wasm-6.1-RELEASE-wasm32-unknown-wasi.artifactbundle.zip
          echo "7550b4c77a55f4b637c376f5d192f297fe185607003a6212ad608276928db992  swift-wasm-6.1-RELEASE-wasm32-unknown-wasi.artifactbundle.zip" | sha256sum --check
          swift sdk install swift-wasm-6.1-RELEASE-wasm32-unknown-wasi.artifactbundle.zip

      - name: Build for WebAssembly
        run: swift build --swift-sdk wasm32-unknown-wasi

      - name: Run Tests (limited)
        continue-on-error: true
        run: swift test --swift-sdk wasm32-unknown-wasi
