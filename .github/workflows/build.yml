name: Build Swift Package on Multiple Platforms

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  SWIFT_VERSION: "6.1"

jobs:
  build-swift-matrix:
    name: Build & Test - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            type: native
            build: swift build --disable-sandbox
            test: swift test --disable-sandbox

          - name: Linux
            runner: ubuntu-22.04
            type: native
            build: swift build --disable-sandbox
            test: swift test --disable-sandbox

          - name: iOS Simulator
            runner: macos-latest
            type: xcodebuild
            sdk: iphonesimulator
            destination: 'platform=iOS Simulator,name=iPhone 16e,OS=18.4'
            run_tests: true

          - name: tvOS Simulator
            runner: macos-latest
            type: xcodebuild
            sdk: appletvsimulator
            destination: 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation) (at 1080p),OS=18.4'
            run_tests: true

          - name: watchOS Simulator
            runner: macos-latest
            type: xcodebuild
            sdk: watchsimulator
            destination: 'platform=watchOS Simulator,name=Apple Watch Ultra 2 (49mm),OS=11.2'
            run_tests: false  # No test support

          - name: macCatalyst
            runner: macos-latest
            type: xcodebuild
            destination: 'platform=macOS,variant=Mac Catalyst'
            run_tests: true

    steps:
      - uses: actions/checkout@v3

      - uses: swift-actions/setup-swift@next
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - run: swift --version

      - name: Build Package
        if: matrix.type == 'native'
        run: ${{ matrix.build }}

      - name: Test Package
        if: matrix.type == 'native'
        run: ${{ matrix.test }}

      - name: xcodebuild - List Schemes
        if: matrix.type == 'xcodebuild'
        run: xcodebuild -list

      - name: Build with xcodebuild
        if: matrix.type == 'xcodebuild'
        run: |
          xcodebuild \
            -scheme rab-foundation \
            -sdk ${{ matrix.sdk || '' }} \
            -destination '${{ matrix.destination }}' \
            clean build

      - name: Run Tests with xcodebuild
        if: matrix.type == 'xcodebuild' && matrix.run_tests == true
        run: |
          xcodebuild \
            -scheme rab-foundation \
            -sdk ${{ matrix.sdk || '' }} \
            -destination '${{ matrix.destination }}' \
            clean test

  build-windows:
    name: Build & Test - Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Swift 6.1 on Windows
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.1-release
          tag: 6.1-RELEASE

      - run: swift --version

      - run: swift build

      - run: swift test

  build-wasm:
    name: Build & Test - WebAssembly (SwiftWasm)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Install Swift SDK for wasm32-unknown-wasi
        run: |
          curl -LO https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.1-RELEASE/swift-wasm-6.1-RELEASE-wasm32-unknown-wasi.artifactbundle.zip
          echo "7550b4c77a55f4b637c376f5d192f297fe185607003a6212ad608276928db992  swift-wasm-6.1-RELEASE-wasm32-unknown-wasi.artifactbundle.zip" | sha256sum --check
          swift sdk install swift-wasm-6.1-RELEASE-wasm32-unknown-wasi.artifactbundle.zip

      - name: Build for WebAssembly
        run: swift build --swift-sdk wasm32-unknown-wasi

      - name: Run Tests (limited)
        continue-on-error: true
        run: swift test --swift-sdk wasm32-unknown-wasi
