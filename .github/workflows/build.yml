name: CI
permissions:
  contents: read
on:
  push:
    branches:
  pull_request:
    branches:
  concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
env:
  SWIFT_VERSION: '6.1'
jobs:
  build-swift-matrix:
    name: 'Native ${{ matrix.name }} (6.1)'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS 26
            runner: macos-26
            skip: true
            relax_tests: false
          - name: macOS 15
            runner: macos-15
            skip: false
            relax_tests: false
          - name: macOS 14
            runner: macos-14
            skip: false
            relax_tests: true
          - name: macOS 13
            runner: macos-13
            skip: false
            relax_tests: true
          - name: Ubuntu 24.04 LTS
            runner: ubuntu-24.04
            skip: false
            relax_tests: false
          - name: Ubuntu 22.04 LTS
            runner: ubuntu-22.04
            skip: false
            relax_tests:  false
    steps:
      - uses: actions/checkout@v3
      - name: Skipped target warning
        if: matrix.skip == true
        run: 'echo "::warning::''${{ matrix.name }}'' is ignored for the moment."'
      - name: Setup Swift
        if: matrix.skip != true
        uses: swift-actions/setup-swift@v2.3.0
        with:
          swift-version: '${{ env.SWIFT_VERSION }}'
      - name: Run Tests
        if: matrix.skip != true
        run: |
          if [[ "${{ matrix.relax_tests }}" == "true" ]]; then
            swift test -Xswiftc -Xfrontend -Xswiftc -enable-actor-data-race-checks=no
          else
            swift test
          fi
  build-xcodebuild-matrix:
    name: '${{ matrix.name }} (6.1)'
    runs-on: ${{ matrix.name == 'visionOS Simulator' && 'macos-15-arm64' || 'macos-15' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS Simulator
            sdk: iphonesimulator
            destination: 'platform=iOS Simulator,name=iPhone 16e,OS=18.4'
            run_tests: true
            skip: false
          - name: tvOS Simulator
            sdk: appletvsimulator
            destination: >-
              platform=tvOS Simulator,name=Apple TV 4K (3rd generation) (at 1080p),OS=18.4
            run_tests: true
            skip: false
          - name: watchOS Simulator (Build only)
            sdk: watchsimulator
            destination: 'platform=watchOS Simulator,name=Apple Watch Ultra 2 (49mm),OS=11.2'
            run_tests: false
            skip: false
          - name: visionOS Simulator
            sdk: xrssimulator
            destination: 'platform=visionOS Simulator,name=Apple Vision Pro,OS=1.0'
            run_tests: false
            skip: false
          - name: macCatalyst
            sdk: macosx
            destination: 'platform=macOS,variant=Mac Catalyst'
            run_tests: true
            skip: false
    steps:
      - uses: actions/checkout@v3
      - name: Skipped target warning
        if: matrix.skip == true
        run: 'echo "::warning::''${{ matrix.name }}'' is ignored for the moment."'
      - name: Setup Swift
        if: matrix.skip != true
        uses: swift-actions/setup-swift@v2.3.0
        with:
          swift-version: '${{ env.SWIFT_VERSION }}'
      - name: Build
        if: matrix.skip != true
        run: |
          xcodebuild
          -scheme rab-foundation
          -sdk ${{ matrix.sdk }}
          -destination '${{ matrix.destination }}'
      - name: Run Tests
        if: matrix.run_tests == true && matrix.skip != true
        run: |
          xcodebuild
          -scheme rab-foundation
          -sdk ${{ matrix.sdk }}
          -destination '${{ matrix.destination }}'
          -enableCodeCoverage NO
          -quiet
          test
  build-windows:
    name: Windows (6.2)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Swift 6.2 on Windows
        uses: compnerd/gha-setup-swift@main
        with:
          branch: swift-6.2-release
          tag: 6.2-RELEASE
      - run: swift build
      - run: swift test
  build-wasm1:
    name: WebAssembly (6.1)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install Swift SDK for wasm32-unknown-wasip1
        run: >
          curl -LO https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.1-RELEASE/swift-wasm-6.1-RELEASE-wasm32-unknown-wasip1.artifactbundle.zip
          
          unzip -q swift-wasm-6.1-RELEASE-wasm32-unknown-wasip1.artifactbundle.zip

          swift sdk install swift-wasm-6.1-RELEASE-wasm32-unknown-wasip1.artifactbundle
      - name: Build Swift Package for WebAssembly
        run: swift build --swift-sdk wasm32-unknown-wasip1
      - name: Test Swift Package (if tests are available)
        continue-on-error: true
        run: swift test --swift-sdk wasm32-unknown-wasip1
  build-wasm2:
    name: WebAssembly (6.2)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install Swift SDK for wasm32-unknown-wasip1
        run: >
          curl -LO https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.2-RELEASE/swift-wasm-6.2-RELEASE-wasm32-unknown-wasip1.artifactbundle.zip

          unzip -q swift-wasm-6.2-RELEASE-wasm32-unknown-wasip1.artifactbundle.zip

          swift sdk install swift-wasm-6.2-RELEASE-wasm32-unknown-wasip1.artifactbundle
      - name: Build Swift Package for WebAssembly
        run: swift build --swift-sdk wasm32-unknown-wasip1
      - name: Test Swift Package (if tests are available)
        continue-on-error: true
        run: swift test --swift-sdk wasm32-unknown-wasip1
