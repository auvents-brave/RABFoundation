name: Generate and Push Swift Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-job:
    runs-on: macos-latest
    steps:
      - name: Build documentation with DocC
        run: |
          echo "Hello world"
          mkdir -p docs
          xcodebuild docbuild \
            -scheme rab-foundation \
            -destination 'platform=macOS' \
            -derivedDataPath docs \
            -package-path .
