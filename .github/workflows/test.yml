name: TEST
permissions:
  contents: read
on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:

  build-windows:
    name: Build on Windows with Swift 6.2
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift 6.2 silently
        shell: pwsh

        run: |
          winget install --id Microsoft.VisualStudio.2022.Community --exact --force --custom "--add Microsoft.VisualStudio.Component.Windows11SDK.22000 --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.VC.Tools.ARM64"
          
          Invoke-WebRequest -Uri https://download.swift.org/swift-6.2-release/windows10/swift-6.2-RELEASE/swift-6.2-RELEASE-windows10.exe `
            -OutFile swift-installer.exe
          Start-Process -FilePath .\swift-installer.exe -ArgumentList "/quiet" -Wait
          # , "/verysilent", "/InstallAllUsers"
          $installPath = "C:\Program Files\Swift\bin"
          $env:Path += ";$installPath"
          [System.Environment]::SetEnvironmentVariable("PATH", $env:Path, [System.EnvironmentVariableTarget]::Process)
          #
          swift --version

      - name: Check Swift Version
        run: swift --version

  build-linux:
    name: Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check Swift Version
        run: swift --version

      - name: Install dependencies
        run: |
          sudo apt-get -y install libcurl4-openssl-dev

      - name: Install Swiftly
        run: |
          curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz
          tar zxf swiftly-$(uname -m).tar.gz
          ./swiftly init --quiet-shell-followup
          #
          # Get Swift binary path and persist it for future steps
          source "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh"
          echo "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/bin" >> $GITHUB_PATH

      - name: Check Swift Version
        run: swift --version

  build-mac:
    name: Mac
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check Swift Version
        run: swift --version

      - name: Install Swiftly
        run: |
          curl -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          ~/.swiftly/bin/swiftly init --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/env.sh"
          hash -r
          #
          # Get Swift binary path and persist it for future steps
          echo "${SWIFTLY_HOME_DIR:-$HOME/.swiftly}/bin" >> $GITHUB_PATH

      - name: Check Swift Version
        run: swift --version

