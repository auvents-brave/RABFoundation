name: Generate and Push Swift Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: macos-14

    steps:
      - name: Install Swift 6.1
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: "6.1"

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate documentation using SwiftPM DocC plugin
        run: |
          swift package \
            --allow-writing-to-directory ./docc-html \
            plugin generate-documentation \
            --target RabFoundation \
            --output-path ./docc-html \
            --transform-for-static-hosting \
            --hosting-base-path swift-docs

      - name: Clone wiki repo
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/auvents-brave/RabFoundation.wiki.git wiki

      - name: Copy generated docs to wiki
        run: |
          rm -rf wiki/docs
          mkdir -p wiki/docs
          cp -r docc-html/* wiki/docs/

      - name: Commit and push docs to wiki
        run: |
          cd wiki
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Update Swift documentation" || echo "No changes to commit"
          git push
