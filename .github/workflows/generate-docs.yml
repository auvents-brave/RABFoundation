name: Generate and Push Swift Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate documentation using SwiftPM DocC plugin
        run: |
          swift package --allow-writing-to-directory ./docc-html \
            generate-documentation \
            --target RabFoundation \
            --output-path ./docc-html \
            --transform-for-static-hosting \
            --hosting-base-path swift-docs

      - name: Clone wiki repo
        run: |
          git clone https://github.com/${{ github.repository_owner }}/RabFoundation.wiki.git wiki

      - name: Copy generated docs to wiki
        run: |
          rm -rf wiki/docs
          mkdir -p wiki/docs
          cp -r docc-html/* wiki/docs/

      - name: Commit and push docs to wiki
        run: |
          cd wiki
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Update Swift documentation" || echo "No changes to commit"
          git push
