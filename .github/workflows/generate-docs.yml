name: Generate and Push Swift Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Debug: List available schemes
        run: xcodebuild -list -package-path .

      - name: Build documentation with DocC
        run: |
          mkdir -p docs
          xcodebuild docbuild \
            -scheme rab-foundation \
            -destination 'platform=macOS' \
            -derivedDataPath docs \
            -package-path .

      - name: Convert DocC archive to static HTML
        run: |
          ARCHIVE_PATH=$(find docs -type d -name "*.doccarchive" | head -n 1)
          echo "Found .doccarchive at: $ARCHIVE_PATH"
          mkdir -p docc-html
          xcrun docc process-archive transform-for-static-hosting "$ARCHIVE_PATH" \
            --output-path docc-html \
            --hosting-base-path swift-docs

      - name: Clone wiki repo
        run: |
          git clone https://github.com/${{ github.repository_owner }}/RabFoundation.wiki.git wiki

      - name: Copy generated docs to wiki
        run: |
          rm -rf wiki/docs
          mkdir -p wiki/docs
          cp -r docc-html/* wiki/docs/

      - name: Commit and push docs to wiki
        run: |
          cd wiki
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .
          git commit -m "Update Swift documentation" || echo "No changes to commit"
          git push
